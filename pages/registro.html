<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - SkillsUp</title>
    <link rel="icon" type="image/png" href="../img/logo3.png">

    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <div class="text-center mb-6">
            <img src="../img/logo1.png" alt="Logo SkillsUp" class="mx-auto h-24 mb-2">
            <h2 class="text-2xl font-bold text-blue-800">Crear Cuenta en SkillsUp</h2>
        </div>
        
        <form id="registroForm">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">Nombre completo</label>
                <input type="text" id="nombre" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Ej. Sergio Pérez" required>
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">Número de Cuenta (UAS)</label>
                <input type="text" id="numeroCuenta" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Ej. 23122897" required>
            </div>
            
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">Correo asociado</label>
                <input type="email" id="correo" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="usuario@gmail.com" required>
            </div>
            <div class="mb-4 relative">
                <label class="block text-gray-700 text-sm font-bold mb-2">Contraseña</label>
                <input type="password" id="password" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 pr-10" placeholder="••••••••" required>
                
                <button type="button" id="btnVerPassword" class="absolute right-3 top-9 text-gray-500 hover:text-blue-600 focus:outline-none">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                </button>
            </div>

            <div class="mb-6 relative">
                <label class="block text-gray-700 text-sm font-bold mb-2">Confirmar Contraseña</label>
                <input type="password" id="confirmPassword" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 pr-10" placeholder="••••••••" required>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-blue-700 transition duration-200">Registrarse</button>
        </form>
        
        <p class="text-center mt-4 text-sm text-gray-600">
            ¿Ya tienes cuenta? <a href="#" class="text-blue-600 hover:underline">Inicia sesión</a><br>
            <a href="../index.html" class="text-gray-500 hover:underline mt-2 inline-block">← Volver al inicio</a>
        </p>
    </div>


    <div id="modalVerificacion" class="hidden fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-xl shadow-2xl max-w-sm w-full text-center relative animate-fade-in-up">
            <h2 class="text-2xl font-bold text-blue-900 mb-4">Revisa tu correo 📧</h2>
            <p class="text-gray-600 mb-6 text-sm">Ingresa el código de 6 dígitos que acabamos de enviar a tu bandeja de entrada para activar tu cuenta.</p>
            
            <input type="text" id="codigoInput" maxlength="6" class="w-full text-center text-3xl tracking-widest border-2 border-gray-300 rounded-lg py-3 focus:border-blue-500 focus:outline-none mb-6" placeholder="000000">
            
            <button id="btnVerificarCodigo" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition shadow-md">
                Verificar y Activar
            </button>
        </div>
    </div>

    <script src="../js/auth.js"></script>
</body>
</html>
