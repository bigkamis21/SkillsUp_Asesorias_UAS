<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - SkillsUp UAS</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h2 class="text-2xl font-bold mb-6 text-center text-blue-800">Crear Cuenta en SkillsUp</h2>
        
        <form id="registroForm">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">Nombre completo</label>
                <input type="text" id="nombre" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Ej. Juan Pérez" required>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">Correo institucional</label>
                <input type="email" id="correo" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="usuario@uas.edu.mx" required>
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2">Contraseña</label>
                <input type="password" id="password" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="••••••••" required>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-blue-700 transition duration-200">Registrarse</button>
        </form>
        
        <p class="text-center mt-4 text-sm text-gray-600">
            ¿Ya tienes cuenta? <a href="#" class="text-blue-600 hover:underline">Inicia sesión</a><br>
            <a href="../index.html" class="text-gray-500 hover:underline mt-2 inline-block">← Volver al inicio</a>
        </p>
    </div>

    <script src="../js/auth.js"></script>
</body>
</html>
