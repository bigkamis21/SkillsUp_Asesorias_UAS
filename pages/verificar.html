<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificar Cuenta - SkillsUp</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-xl shadow-lg max-w-sm w-full text-center">
        <h2 class="text-2xl font-bold text-blue-900 mb-4">Verifica tu correo 📧</h2>
        <p class="text-gray-600 mb-6 text-sm">Ingresa el código de 6 dígitos que enviamos a tu bandeja de entrada.</p>
        
        <input type="text" id="codigoInput" maxlength="6" class="w-full text-center text-3xl tracking-widest border-2 border-gray-300 rounded-lg py-3 focus:border-blue-500 focus:outline-none mb-6" placeholder="000000">
        
        <button id="btnVerificar" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition">Activar Cuenta</button>
    </div>

    <script>
        document.getElementById('btnVerificar').addEventListener('click', async () => {
            const codigo = document.getElementById('codigoInput').value;
            // Recuperamos el número de cuenta de la memoria temporal (localStorage)
            const numeroCuenta = localStorage.getItem('cuentaPendiente');

            const res = await fetch('/api/verificar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ numeroCuenta, codigo })
            });

            const datos = await res.json();
            if (res.ok) {
                alert('¡Cuenta activada! Ya puedes iniciar sesión.');
                window.location.href = 'dashboard.html';
            } else {
                alert(datos.error);
            }
        });
    </script>
</body>
</html>
