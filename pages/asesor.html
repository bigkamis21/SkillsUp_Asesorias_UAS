<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Asesor - SkillsUp</title>
    <link rel="icon" type="image/png" href="../img/logo7.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 flex min-h-screen">

    <aside class="w-64 bg-gray-900 text-white hidden md:flex flex-col shadow-xl">
        <div class="p-6 flex items-center gap-3 border-b border-gray-800">
            <img src="../img/logo1.png" alt="UAS" class="h-10 bg-white rounded-full p-1">
            <span class="text-xl font-bold tracking-wider">SkillsUp</span>
        </div>
        
        <nav class="flex-grow p-4 space-y-2 mt-4">
            <button id="tabAgenda" class="w-full flex items-center gap-3 p-3 bg-gray-800 rounded-lg text-yellow-400 font-medium transition">
                <i class="fas fa-chalkboard-teacher"></i> Mi Agenda
            </button>
            <button id="tabSolicitudes" class="w-full flex items-center gap-3 p-3 hover:bg-gray-800 text-gray-300 rounded-lg font-medium transition relative">
                <i class="fas fa-inbox"></i> Solicitudes Recibidas
                <span id="badgeContador" class="hidden bg-red-500 text-white text-xs px-2 py-1 rounded-full ml-auto">0</span>
            </button>
        </nav>

        <div class="p-4 border-t border-gray-800">
            <button id="btnCerrarSesion" class="w-full flex items-center justify-center gap-2 bg-red-600 hover:bg-red-700 p-3 rounded-lg font-bold transition">
                <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
            </button>
        </div>
    </aside>

    <main class="flex-grow flex flex-col">
        
        <header class="bg-white shadow-sm p-4 flex justify-between items-center px-8">
            <h2 id="tituloRol" class="text-blue-600 font-bold uppercase tracking-wide">Panel de Asesor</h2>
            <div class="flex items-center gap-4">
                <span id="nombreHeader" class="text-sm font-semibold text-gray-700">Cargando...</span>
                <div id="avatar" class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center font-bold text-white uppercase">A</div>
            </div>
        </header>

        <div class="p-8 space-y-8">
            
            <section class="bg-gradient-to-r from-gray-800 to-gray-700 p-8 rounded-2xl text-white shadow-lg relative overflow-hidden">
                <div class="relative z-10">
                    <h1 class="text-3xl font-bold mb-2">¡Hola, <span id="nombreBienvenida">Asesor</span>! 👋</h1>
                    <p class="opacity-90 max-w-md">Gracias por apoyar a la comunidad universitaria. Desde este panel puedes gestionar tu agenda de asesorías.</p>
                </div>
                <i class="fas fa-hands-helping absolute right-8 bottom-[-20px] text-9xl opacity-10"></i>
            </section>

            <div id="seccionAgenda" class="space-y-4">
                <h3 class="text-xl font-bold text-gray-800"><i class="fas fa-calendar-alt mr-2 text-blue-600"></i>Mi Agenda de Asesorías</h3>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6" id="contenedorAgenda">
                    </div>
            </div>

            <div id="seccionSolicitudes" class="space-y-4 hidden">
                <h3 class="text-xl font-bold text-gray-800"><i class="fas fa-envelope-open-text mr-2 text-yellow-500"></i>Solicitudes de Alumnos Pendientes</h3>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6" id="contenedorSolicitudes">
                    </div>
            </div>

        </div>
    </main>

    <script>
        // DATOS DEL ALMACENAMIENTO LOCAL
        const nombreReal = localStorage.getItem('nombreUsuario') || 'Asesor';
        const rolUsuario = localStorage.getItem('rolUsuario') || 'asesor_par';
        const cuentaAsesor = localStorage.getItem('cuentaLogueada'); 

        // RENDER INICIAL DE PERFIL
        document.getElementById('nombreHeader').innerText = nombreReal;
        document.getElementById('nombreBienvenida').innerText = nombreReal;
        document.getElementById('avatar').innerText = nombreReal.charAt(0).toUpperCase();

        const tituloRol = document.getElementById('tituloRol');
        if (rolUsuario === 'asesor_disciplinar') {
            tituloRol.innerText = 'Panel de Asesor Disciplinar';
            tituloRol.classList.replace('text-blue-600', 'text-purple-600');
        } else {
            tituloRol.innerText = 'Panel de Asesor Par';
        }

        // CONTROL DE PESTAÑAS (TABS)
        const tabAgenda = document.getElementById('tabAgenda');
        const tabSolicitudes = document.getElementById('tabSolicitudes');
        const seccionAgenda = document.getElementById('seccionAgenda');
        const seccionSolicitudes = document.getElementById('seccionSolicitudes');

        tabAgenda.addEventListener('click', () => {
            seccionAgenda.classList.remove('hidden');
            seccionSolicitudes.classList.add('hidden');
            tabAgenda.className = "w-full flex items-center gap-3 p-3 bg-gray-800 rounded-lg text-yellow-400 font-medium transition";
            tabSolicitudes.className = "w-full flex items-center gap-3 p-3 hover:bg-gray-800 text-gray-300 rounded-lg font-medium transition relative";
        });

        tabSolicitudes.addEventListener('click', () => {
            seccionSolicitudes.classList.remove('hidden');
            seccionAgenda.classList.add('hidden');
            tabSolicitudes.className = "w-full flex items-center gap-3 p-3 bg-gray-800 rounded-lg text-yellow-400 font-medium transition relative";
            tabAgenda.className = "w-full flex items-center gap-3 p-3 hover:bg-gray-800 text-gray-300 rounded-lg font-medium transition";
        });

        // CARGAR SOLICITUDES PENDIENTES
        async function cargarSolicitudes() {
            try {
                const res = await fetch(`/api/asesor/solicitudes/${cuentaAsesor}`);
                const datos = await res.json();
                const contenedor = document.getElementById('contenedorSolicitudes');
                const badge = document.getElementById('badgeContador');
                
                contenedor.innerHTML = '';
                if(datos.length > 0) {
                    badge.innerText = datos.length;
                    badge.classList.remove('hidden');
                    datos.forEach(sol => {
                        contenedor.innerHTML += `
                            <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-yellow-400 flex flex-col">
                                <div class="flex justify-between items-start mb-2">
                                    <h4 class="font-bold text-lg text-slate-800">${sol.materia}</h4>
                                    <span class="bg-yellow-100 text-yellow-800 text-xs px-2 py-1 rounded font-bold">Pendiente</span>
                                </div>
                                <p class="text-sm text-gray-500 mb-2"><i class="fas fa-user mr-2"></i>Alumno: ${sol.alumno}</p>
                                <p class="text-gray-700 mb-6 bg-gray-50 p-3 rounded italic text-sm">"${sol.motivo}"</p>
                                <div class="mt-auto flex gap-3">
                                    <button onclick="aceptarAsesoria(${sol.cita_id})" class="flex-1 bg-green-500 hover:bg-green-600 text-white font-bold py-2 rounded-lg transition shadow-sm">Aceptar</button>
                                    <button onclick="rechazarAsesoria(${sol.cita_id})" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-2 rounded-lg transition">Rechazar</button>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    badge.classList.add('hidden');
                    contenedor.innerHTML = `<p class="text-gray-500 italic">No tienes solicitudes pendientes por el momento.</p>`;
                }
            } catch (error) {
                console.error("Error cargando solicitudes del asesor:", error);
            }
        }

        // CARGAR AGENDA
        async function cargarAgenda() {
            try {
                const res = await fetch(`/api/asesor/agenda/${cuentaAsesor}`);
                const datos = await res.json();
                const contenedor = document.getElementById('contenedorAgenda');
                
                contenedor.innerHTML = '';
                if(datos.length > 0) {
                    datos.forEach(cita => {
                        contenedor.innerHTML += `
                            <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-green-500 flex flex-col">
                                <h4 class="font-bold text-lg text-slate-800 mb-1">${cita.materia}</h4>
                                <p class="text-sm text-gray-600 mb-2"><b>Asesorado:</b> ${cita.alumno}</p>
                                <p class="text-xs text-gray-500 mb-4 bg-gray-50 p-2 rounded"><b>Mensaje:</b> ${cita.motivo}</p>
                                <a href="${cita.link_reunion}" target="_blank" class="w-full text-center bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg transition flex items-center justify-center gap-2">
                                    <i class="fas fa-video"></i> Ir a la Reunión (Zoom/Meet)
                                </a>
                            </div>
                        `;
                    });
                } else {
                    contenedor.innerHTML = `<p class="text-gray-500 italic">No tienes asesorías programadas en tu agenda.</p>`;
                }
            } catch (error) {
                console.error("Error cargando la agenda:", error);
            }
        }

        // ACCIÓN: RECHAZAR ASESORÍA
        async function rechazarAsesoria(citaId) {
            if(confirm("¿Estás seguro de rechazar esta solicitud de asesoría?")) {
                const res = await fetch('/api/asesor/rechazar-cita', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ citaId })
                });
                if(res.ok) {
                    alert("Solicitud rechazada.");
                    cargarSolicitudes();
                }
            }
        }

        // ACCIÓN: ACEPTAR ASESORÍA (Pidiendo Link externo)
        async function aceptarAsesoria(citaId) {
            const link = prompt("Por favor, introduce el enlace de la reunión (Zoom, Google Meet, Teams, etc.):");
            if (link === null) return; // Cancelado
            if (link.trim() === "") return alert("Debes poner un link válido para aceptar la asesoría.");

            const res = await fetch('/api/asesor/aceptar-cita', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ citaId, linkReunion: link })
            });

            if(res.ok) {
                alert("¡Asesoría agendada! Se le notificará al alumno.");
                cargarSolicitudes();
                cargarAgenda();
            } else {
                alert("Hubo un error al procesar la solicitud.");
            }
        }

        // DISPARADORES AL CARGAR PÁGINA
        cargarSolicitudes();
        cargarAgenda();

        // CERRAR SESIÓN
        document.getElementById('btnCerrarSesion').addEventListener('click', () => {
            localStorage.clear();
            window.location.href = '../index.html';
        });
    </script>
</body>
</html>
